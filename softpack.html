<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Softpack</title>
  <style>
    body { 
      font-family: "Times New Roman", serif; 
      background-image: url('90sstars.png'); 
      background-repeat: repeat; 
      color: #000000; 
      margin: 0;
      padding: 20px 0;
    }
    h1 { 
      color: #000080; 
      text-align: center;
      margin-top: 0;
    }
    a { 
      color: #0000FF; 
      text-decoration: underline; 
    }
    a:hover {
      color: #FF0000;
    }
    .container { 
      width: 800px; 
      margin: 0 auto; 
      border: 2px solid #000; 
      background-color: #FFFFFF; 
      padding: 20px;
      box-shadow: 5px 5px 15px rgba(0,0,0,0.3);
    }
    .nav { 
      background-color: #FFFFE0; 
      padding: 8px; 
      margin-bottom: 15px; 
      text-align: center; 
      border: 1px solid #000080;
    }
    .footer { 
      text-align: center; 
      font-size: small; 
      padding: 15px; 
      background-color: #E0E0E0;
      margin-top: 20px;
      border-top: 1px solid #000;
    }
    h2 { 
      color: #000080; 
      font-size: 1.4em; 
      margin-top: 25px;
      border-bottom: 1px solid #000080;
      padding-bottom: 5px;
    }
    h3 {
      color: #000080;
      margin-bottom: 5px;
      font-size: 1.1em;
    }
    .marquee {
      color: #FF0000;
      font-weight: bold;
      background-color: #FFFFE0;
      padding: 5px;
      margin: 15px 0;
      border: 1px solid #000080;
    }
    .contact-info {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px dotted #000080;
    }
    .date {
      float: right;
      font-weight: bold;
      color: #000080;
    }
    .section {
      margin-bottom: 25px;
    }
    ul { 
      margin: 8px 0 12px 0; 
      padding-left: 25px; 
    }
    li {
      margin-bottom: 5px;
    }
    .highlight {
      background-color: #FFFFCC;
      padding: 2px 5px;
      font-weight: 500;
    }
    .button {
      display: inline-block;
      background-color: #000080;
      color: white;
      padding: 5px 10px;
      margin: 5px;
      text-decoration: none;
      font-weight: bold;
      border: 2px outset #000080;
    }
    .button:hover {
      background-color: #0000FF;
      border: 2px inset #000080;
    }
    .download-btn {
      text-align: center;
      margin: 20px 0;
    }
    /* keep mono for certain skills if needed */
    .skill-cat {
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Softpack</h1>
  
  <marquee class="marquee" behavior="scroll" direction="left">
    MS-DOS Mega Software Collection!
  </marquee>


  <!-- Download button (filename kept as originally) -->
  <div class="download-btn">
    <a href="softpack.zip" class="button" download>Download DOS Softpack 1.54 GB</a>
  </div>


</body>
</html>
